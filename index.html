<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .thin-border { border: 1px solid #222; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-2xl mx-auto space-y-12">
        
        <div class="flex justify-between items-start">
            <div>
                <h1 id="display-remaining" class="text-6xl font-light tracking-tighter">0 kr</h1>
                <p class="text-gray-500 text-xs uppercase tracking-widest mt-2">Mangler stadig</p>
            </div>
            <button onclick="document.getElementById('settings').classList.toggle('hidden')" class="text-gray-700 hover:text-white transition">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div id="settings" class="hidden space-y-4 pt-4 border-t border-[#111]">
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="cfg-target" placeholder="Mål" class="bg-transparent border-b border-[#222] p-2 text-sm outline-none focus:border-white">
                <input type="number" id="cfg-discount" placeholder="Rabat" class="bg-transparent border-b border-[#222] p-2 text-sm outline-none focus:border-white">
                <input type="number" id="cfg-other" placeholder="Pure" class="bg-transparent border-b border-[#222] p-2 text-sm outline-none focus:border-white">
            </div>
            <button onclick="saveSettings()" class="w-full text-[10px] font-bold tracking-widest uppercase border border-[#222] py-2 hover:bg-white hover:text-black transition">Gem Konfiguration</button>
        </div>

        <section class="space-y-6">
            <div class="flex justify-between items-center border-b border-[#111] pb-2">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Aktive Opgaver</h2>
                <button onclick="document.getElementById('new-task-modal').classList.toggle('hidden')" class="text-xs text-blue-500 underline">Ny opgave</button>
            </div>
            
            <div id="task-list" class="space-y-4"></div>

            <div id="new-task-modal" class="hidden space-y-4 bg-[#050505] p-4 rounded border border-[#222]">
                <input type="text" id="t-name" placeholder="Navn på opgave" class="w-full bg-transparent border-b border-[#222] py-2 outline-none">
                <input type="number" id="t-reward" placeholder="Løn (kr)" class="w-full bg-transparent border-b border-[#222] py-2 outline-none">
                <button onclick="saveTask()" class="w-full bg-white text-black py-2 text-xs font-bold uppercase">Opret</button>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-[#111] pb-2">Logbog</h2>
            <div id="money-log" class="space-y-3"></div>
        </section>

    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="confirmCompletion()">

    <script>
        let config = JSON.parse(localStorage.getItem('cfg')) || { target: 8500, discount: 1100, other: 4920 };
        let money = JSON.parse(localStorage.getItem('money')) || [{amt: 420, note: 'Startbeløb', date: '09-04-2026'}];
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentTaskId = null;

        function saveSettings() {
            config.target = parseInt(document.getElementById('cfg-target').value) || 0;
            config.discount = parseInt(document.getElementById('cfg-discount').value) || 0;
            config.other = parseInt(document.getElementById('cfg-other').value) || 0;
            localStorage.setItem('cfg', JSON.stringify(config));
            render();
        }

        function saveTask() {
            const name = document.getElementById('t-name').value;
            const reward = document.getElementById('t-reward').value;
            if(!name || !reward) return;
            tasks.push({ id: Date.now(), name, reward: parseInt(reward) });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            document.getElementById('new-task-modal').classList.add('hidden');
            render();
        }

        function startComplete(id) {
            currentTaskId = id;
            document.getElementById('camera-input').click();
        }

        function confirmCompletion() {
            const idx = tasks.findIndex(t => t.id === currentTaskId);
            money.unshift({ amt: tasks[idx].reward, note: tasks[idx].name, date: new Date().toLocaleDateString('da-DK') });
            tasks.splice(idx, 1);
            localStorage.setItem('money', JSON.stringify(money));
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
            alert("Billede gemt og penge overført!");
        }

        function render() {
            const saved = money.reduce((s, i) => s + i.amt, 0);
            const remaining = config.target - config.discount - config.other - saved;
            document.getElementById('display-remaining').innerText = remaining.toLocaleString() + " kr";

            document.getElementById('task-list').innerHTML = tasks.map(t => `
                <div class="flex justify-between items-center py-2">
                    <div>
                        <p class="text-sm font-medium">${t.name}</p>
                        <p class="text-[10px] text-blue-500 font-mono">${t.reward} kr</p>
                    </div>
                    <button onclick="startComplete(${t.id})" class="text-[10px] border border-white/20 px-3 py-1 rounded-full hover:bg-white hover:text-black">Udfør & Foto</button>
                </div>
            `).join('');

            document.getElementById('money-log').innerHTML = money.map(m => `
                <div class="flex justify-between text-xs py-1">
                    <span class="text-gray-500">${m.note}</span>
                    <span class="font-mono text-gray-300">${m.amt} kr</span>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
