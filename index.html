<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Opsparing Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #0a84ff; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Mobil-først container */
        .app-shell {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px; /* Plads til flydende knapper */
        }

        .ios-card { 
            background: var(--card); 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.1s ease;
        }

        .ios-card:active { transform: scale(0.97); }

        .ios-blur {
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .hidden { display: none !important; }

        /* Gør input-felter store og lækre på tlf */
        input, select {
            background: rgba(255,255,255,0.08) !important;
            border-radius: 16px !important;
            padding: 16px !important;
            font-size: 17px !important; /* Forhindrer iOS auto-zoom */
            width: 100%;
            border: none !important;
            color: white !important;
        }

        .floating-add {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            right: 25px;
            width: 65px;
            height: 65px;
            background: #facc15;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Opsparing</h1>
            <div class="ios-card px-4 py-2 flex items-center gap-2">
                <span class="text-orange-500">🔥</span>
                <span id="global-streak" class="font-bold text-sm">0</span>
            </div>
        </header>

        <div id="view-dashboard" class="space-y-8">
            
            <div class="text-center py-6">
                <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.3em] mb-1">Mangler stadig til <span id="current-goal-title">mål</span></p>
                <h2 id="dash-remaining" class="text-6xl font-black tracking-tighter mb-6">0 kr</h2>
                <div class="w-full bg-white/10 h-2.5 rounded-full overflow-hidden mb-2">
                    <div id="dash-progress-fill" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <div class="flex justify-between px-1">
                    <span id="dash-pct" class="text-[10px] font-bold opacity-30 uppercase tracking-widest">0% Færdig</span>
                    <button onclick="generateShareCard()" class="text-blue-500 text-[10px] font-bold uppercase tracking-widest">Del <i class="fas fa-share ml-1"></i></button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-[11px] font-black opacity-40 uppercase tracking-widest">Aktive Opgaver</h3>
                    <button onclick="toggleModal('task-modal')" class="text-blue-500 text-xs font-bold">Ny +</button>
                </div>
                <div id="dash-tasks" class="space-y-3"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[11px] font-black opacity-40 uppercase tracking-widest">Historik</h3>
                <div id="dash-log" class="ios-card p-4 space-y-4 divide-y divide-white/5">
                    </div>
            </div>
        </div>
    </div>

    <button onclick="toggleModal('quick-log-modal')" class="floating-add">
        <i class="fas fa-plus"></i>
    </button>

    <div id="quick-log-modal" class="hidden fixed inset-0 ios-blur z-[500] flex items-end sm:items-center justify-center p-0 sm:p-6">
        <div class="bg-[#1c1c1e] w-full max-w-[500px] p-8 rounded-t-[32px] sm:rounded-[32px] space-y-6">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto -mt-2 mb-4"></div>
            <h2 class="text-2xl font-black italic text-center uppercase tracking-tighter">Tilføj Penge 💰</h2>
            
            <div class="space-y-4">
                <input type="number" id="quick-amt" placeholder="Beløb (kr)" inputmode="numeric">
                <input type="date" id="quick-date">
                <input type="text" id="quick-note" placeholder="Hvad har du lavet?">
            </div>

            <button onclick="submitQuickLog()" class="w-full py-5 bg-blue-500 text-white rounded-2xl font-black text-lg shadow-lg">GEM LOG</button>
            <button onclick="toggleModal('quick-log-modal')" class="w-full py-2 text-white/30 font-bold uppercase text-[10px]">Annuller</button>
        </div>
    </div>

    <div id="task-modal" class="hidden fixed inset-0 ios-blur z-[500] flex items-center justify-center p-6">
        <div class="ios-card p-8 w-full max-w-sm space-y-5">
            <h2 class="text-xl font-bold uppercase italic tracking-tight">Opret Opgave</h2>
            <div class="space-y-3">
                <input type="text" id="t-name" placeholder="Navn på opgave">
                <input type="number" id="t-reward" placeholder="Løn i kr" inputmode="numeric">
            </div>
            <button onclick="createNewTask()" class="w-full py-4 bg-blue-600 rounded-xl font-bold">OPRET</button>
            <button onclick="toggleModal('task-modal')" class="w-full text-xs opacity-30 font-bold uppercase">Luk</button>
        </div>
    </div>

    <input type="file" id="camera-input" class="hidden" accept="image/*" capture="environment" onchange="completeActiveTask()">

    <script>
        const STORAGE_KEY = "opsparing_final_v12";
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            user: { name: 'Jonathan', pfp: '' },
            goals: [{ id: 1, name: 'Flyveklub', target: 8500, discount: 1100, other: 4920 }],
            logs: [],
            tasks: []
        };
        let activeTaskId = null;
        let activeGoalId = 1; 

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
            if(id === 'quick-log-modal') {
                document.getElementById('quick-date').valueAsDate = new Date();
                document.getElementById('quick-amt').focus();
            }
        }

        function calculateStreak() {
            if (state.logs.length === 0) return 0;
            const dates = [...new Set(state.logs.map(l => l.date))].sort((a,b) => new Date(b) - new Date(a));
            let streak = 0; let check = new Date();
            for(let d of dates) {
                let ld = new Date(d);
                if(Math.floor((check - ld)/86400000) <= 1) { streak++; check = ld; } else break;
            }
            return streak;
        }

        function renderDashboard() {
            const g = state.goals[0]; // Vi fokuserer på dit hovedmål
            const saved = state.logs.reduce((s, i) => s + i.amt, 0);
            const total = (g.target - (g.discount||0) - (g.other||0));
            const rem = total - saved;
            const pct = Math.min(100, Math.floor((saved/total)*100));

            document.getElementById('dash-remaining').innerText = (rem > 0 ? rem : 0).toLocaleString() + " kr";
            document.getElementById('dash-progress-fill').style.width = pct + "%";
            document.getElementById('dash-pct').innerText = pct + "% Færdig";
            document.getElementById('global-streak').innerText = calculateStreak();

            // Opgaver
            document.getElementById('dash-tasks').innerHTML = state.tasks.map(t => `
                <div onclick="activeTaskId=${t.id}; document.getElementById('camera-input').click()" class="ios-card p-5 flex justify-between items-center active:bg-white/5">
                    <p class="font-bold">${t.name}</p>
                    <div class="text-blue-500 font-black">${t.reward}.-</div>
                </div>
            `).join('') || '<p class="text-center opacity-20 text-[10px] py-4">Ingen aktive opgaver</p>';

            // Logbog
            document.getElementById('dash-log').innerHTML = state.logs.map(l => `
                <div class="flex justify-between items-start pt-4 first:pt-0">
                    <div>
                        <p class="text-[13px] font-bold">${l.note}</p>
                        <p class="text-[10px] opacity-30 uppercase font-black">${new Date(l.date).toLocaleDateString('da-DK')}</p>
                    </div>
                    <span class="font-black text-green-500 text-sm">+${l.amt} kr</span>
                </div>
            `).join('') || '<p class="text-center opacity-20 text-[10px] py-4">Din historik vil blive vist her</p>';
        }

        function submitQuickLog() {
            const amt = parseInt(document.getElementById('quick-amt').value);
            const date = document.getElementById('quick-date').value;
            const note = document.getElementById('quick-note').value || 'Penge lagt til';
            if(!amt || !date) return;

            state.logs.unshift({ goalId: activeGoalId, amt, note, date });
            save();
            toggleModal('quick-log-modal');
            confetti({ particleCount: 150, origin: { y: 0.8 } });
            renderDashboard();
            
            document.getElementById('quick-amt').value = '';
            document.getElementById('quick-note').value = '';
        }

        function createNewTask() {
            const n = document.getElementById('t-name').value;
            const r = document.getElementById('t-reward').value;
            if(!n || !r) return;
            state.tasks.push({ id: Date.now(), goalId: activeGoalId, name: n, reward: parseInt(r) });
            save();
            toggleModal('task-modal');
            renderDashboard();
            document.getElementById('t-name').value = '';
            document.getElementById('t-reward').value = '';
        }

        function completeActiveTask() {
            const t = state.tasks.find(x => x.id === activeTaskId);
            state.logs.unshift({ goalId: activeGoalId, amt: t.reward, note: t.name, date: new Date().toISOString().split('T')[0] });
            state.tasks = state.tasks.filter(x => x.id !== activeTaskId);
            save();
            confetti({ particleCount: 150 });
            renderDashboard();
        }

        function generateShareCard() {
            const g = state.goals[0];
            const saved = state.logs.reduce((s, i) => s + i.amt, 0);
            const rem = (g.target - (g.discount||0) - (g.other||0)) - saved;
            const text = `💰 Jeg mangler kun ${(rem > 0 ? rem : 0).toLocaleString()} kr til ${g.name.toUpperCase()}! 🔥 Streak: ${calculateStreak()} dage.`;
            if (navigator.share) { navigator.share({ text: text }); } else { alert("Kopieret til udklipsholder!"); navigator.clipboard.writeText(text); }
        }

        // Start app
        renderDashboard();
    </script>
</body>
</html>
