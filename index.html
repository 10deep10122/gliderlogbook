<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jonathan Opsparing Pro v27</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding-top: env(safe-area-inset-top); min-height: 100vh; }
        .ios-card { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.06); }
        .hidden { display: none !important; }
        input { background: #2c2c2e !important; border: none !important; color: white !important; border-radius: 14px !important; padding: 15px !important; width: 100%; }
        .btn-main { background: #fff; color: #000; font-weight: 900; border-radius: 18px; transition: 0.2s; }
        .floating-add { position: fixed; bottom: 30px; right: 20px; width: 64px; height: 64px; background: #facc15; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: black; z-index: 100; box-shadow: 0 10px 30px rgba(250,204,21,0.4); }
        #dash-bar { transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="fixed top-4 right-4 flex items-center gap-2 z-[1000] bg-black/60 px-3 py-1.5 rounded-full border border-white/10 backdrop-blur-md">
        <div id="sync-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
        <span class="text-[9px] font-black uppercase opacity-60 tracking-tighter">Live Cloud Sync</span>
    </div>

    <div class="max-w-md mx-auto space-y-8">
        
        <header class="flex justify-between items-center pt-4 px-2">
            <div class="flex flex-col">
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Vælg Mål</p>
                <select id="profile-selector" onchange="switchProfile(this.value)" class="bg-transparent text-2xl font-black italic uppercase tracking-tighter outline-none border-none text-white cursor-pointer appearance-none">
                    </select>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleModal('modal-edit-goal')" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/40 border border-white/5"><i class="fas fa-cog"></i></button>
                <button onclick="generateShareImage()" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-blue-500 border border-white/5"><i class="fas fa-share-nodes"></i></button>
            </div>
        </header>

        <section id="view-dash" class="space-y-10">
            <div class="text-center space-y-5">
                <div class="space-y-1">
                    <h2 id="dash-rem" class="text-7xl font-black tracking-tighter">0 kr</h2>
                    <p class="text-[10px] font-black opacity-20 uppercase tracking-widest">Mangler i alt</p>
                </div>
                <div class="px-4">
                    <div class="w-full bg-white/5 h-3 rounded-full overflow-hidden mb-2">
                        <div id="dash-bar" class="bg-blue-500 h-full shadow-[0_0_15px_#0a84ff]"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-black opacity-40 uppercase tracking-widest italic">
                        <span id="dash-pct">0% Færdig</span>
                        <span id="dash-goal-val">Mål: 0 kr</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-[11px] font-black opacity-50 uppercase tracking-widest">Opgaver</h3>
                    <button onclick="toggleModal('modal-task')" class="text-blue-500 font-black text-xs">+ NY OPGAVE</button>
                </div>
                <div id="dash-tasks" class="space-y-3"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[11px] font-black opacity-50 uppercase tracking-widest px-2 italic">Historik (Klik for bevis)</h3>
                <div id="dash-logs" class="ios-card p-5 space-y-4 divide-y divide-white/5"></div>
            </div>
        </section>
    </div>

    <div id="modal-edit-goal" class="hidden fixed inset-0 bg-black/95 z-[1500] flex items-center p-6 backdrop-blur-xl">
        <div class="ios-card w-full p-8 space-y-6">
            <h2 class="text-2xl font-black uppercase italic">Rediger Mål</h2>
            <div class="space-y-4">
                <div><label class="text-[10px] font-black opacity-40 uppercase ml-2">Navn</label><input type="text" id="edit-goal-name"></div>
                <div><label class="text-[10px] font-black opacity-40 uppercase ml-2">Total Mål (kr)</label><input type="number" id="edit-goal-target"></div>
                <div><label class="text-[10px] font-black opacity-40 uppercase ml-2">Allerede sparet (kr)</label><input type="number" id="edit-goal-base"></div>
            </div>
            <button onclick="saveGoalEdit()" class="w-full py-5 btn-main uppercase">Gem ændringer</button>
            <button onclick="toggleModal('modal-edit-goal')" class="w-full text-xs opacity-30 font-black uppercase py-4">Annuller</button>
        </div>
    </div>

    <div id="modal-evidence" class="hidden fixed inset-0 bg-black/98 z-[2000] flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="w-full max-w-sm space-y-6 text-center">
            <img id="evidence-img" src="" class="w-full rounded-3xl border border-white/10 shadow-2xl aspect-square object-cover">
            <div class="space-y-1">
                <p id="evidence-note" class="font-black text-2xl uppercase italic"></p>
                <p class="text-xs opacity-30 uppercase font-black tracking-widest">Tryk for at lukke</p>
            </div>
        </div>
    </div>

    <div id="modal-task" class="hidden fixed inset-0 bg-black/90 z-[1500] flex items-center p-6">
        <div class="ios-card w-full p-8 space-y-5">
            <h2 class="text-2xl font-black italic uppercase">Ny Opgave</h2>
            <input type="text" id="t-name" placeholder="F.eks. Støvsuge">
            <input type="number" id="t-reward" placeholder="Løn i kr">
            <button onclick="addTask()" class="w-full py-5 btn-main uppercase">Tilføj opgave</button>
            <button onclick="toggleModal('modal-task')" class="w-full text-xs opacity-30 font-black uppercase py-4">Luk</button>
        </div>
    </div>

    <button onclick="addManualMoney()" class="floating-add"><i class="fas fa-plus"></i></button>
    <input type="file" id="camera-input" class="hidden" accept="image/*" capture="environment" onchange="completeTask(event)">

    <script>
        const SUPABASE_URL = "https://kexfggljjpirfugtsobe.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Qs19BzZiPZoRljsrO7JC-Q_malvvmSy";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let state = { activeProfileIndex: 0, profiles: [] };
        let activeTaskId = null;

        async function loadData() {
            const { data } = await _supabase.from('savings_data').select('*').single();
            if (data) { 
                state = data.json_data; 
                render(); 
            }
        }

        async function sync() {
            document.getElementById('sync-dot').style.background = '#facc15';
            await _supabase.from('savings_data').upsert({ id: 1, json_data: state });
            document.getElementById('sync-dot').style.background = '#22c55e';
            render();
        }

        function render() {
            if (!state.profiles.length) return;
            const p = state.profiles[state.activeProfileIndex];
            const saved = p.logs.reduce((s, i) => s + i.amt, 0);
            const totalToSave = p.target - p.base;
            const rem = totalToSave - saved;
            const pct = Math.min(100, Math.floor((saved/totalToSave)*100)) || 0;

            // Opdater Selector
            const selector = document.getElementById('profile-selector');
            selector.innerHTML = state.profiles.map((prof, i) => 
                `<option value="${i}" ${i == state.activeProfileIndex ? 'selected' : ''}>${prof.name}</option>`
            ).join('') + `<option value="new">+ NYT MÅL...</option>`;

            // Dash
            document.getElementById('dash-rem').innerText = (rem > 0 ? rem : 0).toLocaleString() + " kr";
            document.getElementById('dash-bar').style.width = pct + "%";
            document.getElementById('dash-pct').innerText = pct + "% FÆRDIG";
            document.getElementById('dash-goal-val').innerText = "Mål: " + p.target.toLocaleString() + " kr";

            // Opgaver
            document.getElementById('dash-tasks').innerHTML = p.tasks.map(t => `
                <div onclick="activeTaskId=${t.id}; document.getElementById('camera-input').click()" class="ios-card p-5 flex justify-between items-center active:scale-95 transition border-l-4 border-blue-500">
                    <span class="font-bold text-lg">${t.name}</span>
                    <span class="text-blue-500 font-black text-xl">${t.reward}.-</span>
                </div>
            `).join('') || '<p class="text-center opacity-20 text-xs py-4">Ingen aktive opgaver</p>';

            // Logbog
            document.getElementById('dash-logs').innerHTML = p.logs.map((l, i) => `
                <div onclick="showEvidence(${i})" class="pt-4 first:pt-0 flex justify-between items-center cursor-pointer active:opacity-50">
                    <div>
                        <p class="font-bold text-base leading-none mb-1">${l.note}</p>
                        <p class="text-[9px] opacity-30 font-black uppercase tracking-tighter">${new Date(l.date).toLocaleDateString('da-DK')}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-green-500 font-black text-lg">+${l.amt}</span>
                        ${l.img ? '<i class="fas fa-camera text-blue-500 text-[10px]"></i>' : ''}
                    </div>
                </div>
            `).join('');

            // Edit Fields
            document.getElementById('edit-goal-name').value = p.name;
            document.getElementById('edit-goal-target').value = p.target;
            document.getElementById('edit-goal-base').value = p.base;
        }

        function switchProfile(val) {
            if (val === 'new') {
                const name = prompt("Navn på nyt mål (f.eks. Ny PC):");
                if (name) {
                    state.profiles.push({ id: Date.now(), name, target: 1000, base: 0, logs: [], tasks: [] });
                    state.activeProfileIndex = state.profiles.length - 1;
                    sync();
                }
            } else {
                state.activeProfileIndex = parseInt(val);
                render();
            }
        }

        function saveGoalEdit() {
            const p = state.profiles[state.activeProfileIndex];
            p.name = document.getElementById('edit-goal-name').value;
            p.target = parseInt(document.getElementById('edit-goal-target').value);
            p.base = parseInt(document.getElementById('edit-goal-base').value);
            sync();
            toggleModal('modal-edit-goal');
        }

        function showEvidence(index) {
            const l = state.profiles[state.activeProfileIndex].logs[index];
            if (!l.img) return;
            document.getElementById('evidence-img').src = l.img;
            document.getElementById('evidence-note').innerText = l.note;
            toggleModal('modal-evidence');
        }

        function addTask() {
            const name = document.getElementById('t-name').value;
            const reward = parseInt(document.getElementById('t-reward').value);
            if(!name || !reward) return;
            state.profiles[state.activeProfileIndex].tasks.push({ id: Date.now(), name, reward });
            sync(); toggleModal('modal-task');
            document.getElementById('t-name').value = ''; document.getElementById('t-reward').value = '';
        }

        function completeTask(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const p = state.profiles[state.activeProfileIndex];
                const t = p.tasks.find(x => x.id === activeTaskId);
                p.logs.unshift({ amt: t.reward, note: t.name, date: new Date().toISOString(), img: e.target.result });
                p.tasks = p.tasks.filter(x => x.id !== activeTaskId);
                await sync();
                confetti({ particleCount: 200, origin: { y: 0.8 } });
            };
            reader.readAsDataURL(file);
        }

        function addManualMoney() {
            const amt = parseInt(prompt("Indtast beløb du har tjent:"));
            if(amt) {
                const note = prompt("Hvad tjente du dem på?", "Manuel indbetaling");
                state.profiles[state.activeProfileIndex].logs.unshift({ 
                    amt, note: note || "Manuel indbetaling", date: new Date().toISOString() 
                });
                sync();
            }
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'savings_data' }, payload => {
            state = payload.new.json_data;
            render();
        }).subscribe();

        loadData();
    </script>
</body>
</html>
