<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opsparings Tracker - Flyveklub Medlemskab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-white font-sans min-h-screen">

    <nav class="p-6 bg-[#0f0f0f] border-b border-gray-800">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-[#ff9f1c] font-bold text-xl uppercase tracking-widest">Klub Medlemskab</h1>
            <div class="text-xs text-gray-500 uppercase">Status & Fremdrift</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-[#141414] p-6 rounded-xl border border-gray-800">
                <p class="text-gray-500 text-xs uppercase mb-1">Mål (Total)</p>
                <p class="text-2xl font-bold text-[#ff9f1c]">4.920 kr</p>
            </div>
            <div class="bg-[#141414] p-6 rounded-xl border border-gray-800">
                <p class="text-gray-500 text-xs uppercase mb-1">Opsparet</p>
                <p id="display-opsparet" class="text-2xl font-bold text-green-500">0 kr</p>
            </div>
            <div class="bg-[#141414] p-6 rounded-xl border border-gray-800">
                <p class="text-gray-500 text-xs uppercase mb-1">Mangler stadig</p>
                <p id="display-mangler" class="text-2xl font-bold text-red-500">4.920 kr</p>
            </div>
        </div>

        <section class="space-y-4">
            <div class="bg-[#ff9f1c] text-black px-4 py-2 font-bold uppercase text-sm flex justify-between items-center rounded-t-lg">
                <span><i class="fas fa-piggy-bank mr-2"></i> Opsparing - Hvad har du tjent?</span>
                <button onclick="toggleModal('money-modal')" class="bg-black text-white px-3 py-1 rounded text-xs hover:bg-gray-800">+ Tilføj beløb</button>
            </div>
            <div class="bg-[#141414] border border-gray-800 rounded-b-lg overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-[#1a1a1a] text-gray-400 uppercase text-[10px]">
                        <tr>
                            <th class="p-4">Dato</th>
                            <th class="p-4">Beløb (kr)</th>
                            <th class="p-4">Note</th>
                            <th class="p-4">Indsat af</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="money-table">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="space-y-4">
            <div class="bg-[#ff9f1c] text-black px-4 py-2 font-bold uppercase text-sm rounded-t-lg">
                <i class="fas fa-tasks mr-2"></i> Opgaver - Hvordan tjener du mere?
            </div>
            <div class="bg-[#141414] border border-gray-800 rounded-b-lg p-6">
                <div id="task-list" class="space-y-3">
                    </div>
                <div class="mt-6 flex gap-2">
                    <input type="text" id="task-input" placeholder="Ny opgave (f.feks. Slå græs)..." class="bg-[#1a1a1a] border border-gray-700 rounded px-4 py-2 text-sm w-full outline-none focus:border-[#ff9f1c]">
                    <button onclick="addTask()" class="bg-[#ff9f1c] text-black px-4 py-2 rounded font-bold text-sm hover:bg-[#e68a17]">Tilføj</button>
                </div>
            </div>
        </section>

    </main>

    <div id="money-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-[#141414] border border-gray-800 p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-6 text-[#ff9f1c]">Registrer indtjening</h2>
            <div class="space-y-4">
                <input type="number" id="input-amount" placeholder="Beløb i kr" class="w-full bg-[#1a1a1a] border border-gray-700 p-3 rounded">
                <input type="text" id="input-note" placeholder="Hvad har du lavet?" class="w-full bg-[#1a1a1a] border border-gray-700 p-3 rounded">
                <input type="text" id="input-who" placeholder="Hvem har betalt?" class="w-full bg-[#1a1a1a] border border-gray-700 p-3 rounded">
                <div class="flex gap-2">
                    <button onclick="saveMoney()" class="flex-1 bg-[#ff9f1c] text-black font-bold py-3 rounded">Gem</button>
                    <button onclick="toggleModal('money-modal')" class="flex-1 bg-gray-800 py-3 rounded">Annuller</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let savings = JSON.parse(localStorage.getItem('savings_data')) || [];
        let tasks = JSON.parse(localStorage.getItem('tasks_data')) || [
            { text: "Slå græs hos naboen", done: false },
            { text: "Vaske bil", done: false }
        ];
        const target = 4920;

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function saveMoney() {
            const amount = document.getElementById('input-amount').value;
            const note = document.getElementById('input-note').value;
            const who = document.getElementById('input-who').value;
            const date = new Date().toLocaleDateString('da-DK');

            if(amount) {
                savings.unshift({ date, amount: parseInt(amount), note, who });
                localStorage.setItem('savings_data', JSON.stringify(savings));
                render();
                toggleModal('money-modal');
            }
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if(input.value) {
                tasks.push({ text: input.value, done: false });
                localStorage.setItem('tasks_data', JSON.stringify(tasks));
                input.value = '';
                render();
            }
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            localStorage.setItem('tasks_data', JSON.stringify(tasks));
            render();
        }

        function render() {
            // Penge tabel
            const table = document.getElementById('money-table');
            let total = 0;
            table.innerHTML = savings.map((s, i) => {
                total += s.amount;
                return `
                <tr class="border-b border-gray-800/50">
                    <td class="p-4 text-gray-500 text-xs">${s.date}</td>
                    <td class="p-4 font-bold text-[#ff9f1c]">${s.amount} kr</td>
                    <td class="p-4 text-gray-300 text-xs">${s.note}</td>
                    <td class="p-4 text-gray-500 text-xs">${s.who}</td>
                    <td class="p-4 text-right"><button onclick="deleteMoney(${i})" class="text-gray-700 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            }).join('');

            // Opdater stats
            document.getElementById('display-opsparet').innerText = total + " kr";
            document.getElementById('display-mangler').innerText = (target - total) + " kr";

            // Opgaver
            document.getElementById('task-list').innerHTML = tasks.map((t, i) => `
                <div onclick="toggleTask(${i})" class="flex items-center gap-3 p-3 bg-[#1a1a1a] rounded cursor-pointer border border-gray-800 hover:border-gray-700">
                    <i class="fas ${t.done ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-700'}"></i>
                    <span class="${t.done ? 'line-through text-gray-600' : 'text-gray-300'} text-sm">${t.text}</span>
                </div>
            `).join('');
        }

        function deleteMoney(i) {
            savings.splice(i, 1);
            localStorage.setItem('savings_data', JSON.stringify(savings));
            render();
        }

        render();
    </script>
</body>
</html>
