<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glider Logbook PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <nav class="p-4 border-b border-slate-800 flex justify-between items-center max-w-6xl mx-auto bg-slate-950 sticky top-0 z-50">
        <div class="text-xl font-bold flex items-center gap-2 italic">
            <i class="fas fa-paper-plane text-blue-500"></i> GLIDER LOG
        </div>
        <button onclick="alert('Google Login opsættes i næste fase!')" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-sm flex items-center gap-2">
            <i class="fab fa-google"></i> Login
        </button>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="grid lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-bold">Logbog</h1>
                        <p class="text-slate-500 text-sm">Dine seneste flyvninger</p>
                    </div>
                    <button onclick="addLogEntry()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold">
                        <i class="fas fa-plus mr-2"></i>Ny Log
                    </button>
                </div>

                <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                            <tr>
                                <th class="p-4">Flytype</th>
                                <th class="p-4">Registrering</th>
                                <th class="p-4">Varighed</th>
                                <th class="p-4 text-right">Handling</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            </tbody>
                    </table>
                </div>

                <div class="bg-gradient-to-br from-indigo-900 to-blue-900 p-6 rounded-3xl border border-blue-400/20 flex items-center justify-between shadow-xl">
                    <div>
                        <h3 class="font-bold text-xl">Snap & Log AI</h3>
                        <p class="text-blue-200 text-sm">Tag billede af din papir-logbog</p>
                    </div>
                    <label class="cursor-pointer bg-white/10 hover:bg-white/20 p-4 rounded-2xl transition border border-white/20">
                        <i class="fas fa-camera text-2xl"></i>
                        <input type="file" accept="image/*" class="hidden" onchange="processImage(this)">
                    </label>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-xl font-bold">Mine Fly</h2>
                <div id="aircraftContainer" class="space-y-4">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // Standard Fly Data
        const aircrafts = [
            { type: 'LS4', reg: 'OY-XRG', img: 'https://images.unsplash.com/photo-1517400508447-f8dd518b86db?q=80&w=300', span: '15m' },
            { type: 'ASK21', reg: 'OY-XSC', img: 'https://images.unsplash.com/photo-1464039397811-476f652a343b?q=80&w=300', span: '17m' },
            { type: 'Duo Discus', reg: 'OY-XLT', img: 'https://images.unsplash.com/photo-1540962351504-03099e0a75c3?q=80&w=300', span: '20m' }
        ];

        // Funktion til at vise fly
        function displayAircrafts() {
            const container = document.getElementById('aircraftContainer');
            container.innerHTML = aircrafts.map(ac => `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-blue-500 transition group cursor-pointer">
                    <img src="${ac.img}" class="w-full h-24 object-cover opacity-60 group-hover:opacity-100 transition">
                    <div class="p-3">
                        <div class="flex justify-between">
                            <span class="font-bold">${ac.reg}</span>
                            <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400">${ac.type}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-1">Spændvidde: ${ac.span}</p>
                    </div>
                </div>
            `).join('');
        }

        // Simpel Log-funktion
        let logs = JSON.parse(localStorage.getItem('myLogs')) || [
            { type: 'LS4', reg: 'OY-XRG', duration: '02:30' }
        ];

        function displayLogs() {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = logs.map((log, index) => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition">
                    <td class="p-4 text-sm font-medium">${log.type}</td>
                    <td class="p-4 text-sm text-slate-400">${log.reg}</td>
                    <td class="p-4 text-sm text-blue-400 font-mono">${log.duration}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteLog(${index})" class="text-slate-600 hover:text-red-500 transition"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function addLogEntry() {
            const duration = prompt("Hvor længe fløj du? (f.eks. 01:45)");
            if (duration) {
                logs.unshift({ type: 'ASK21', reg: 'OY-XSC', duration: duration });
                localStorage.setItem('myLogs', JSON.stringify(logs));
                displayLogs();
            }
        }

        function deleteLog(index) {
            logs.splice(index, 1);
            localStorage.setItem('myLogs', JSON.stringify(logs));
            displayLogs();
        }

        function processImage(input) {
            alert("Billede modtaget! AI-processering starter... (Dette kræver en server i næste skridt)");
        }

        // Start appen
        displayAircrafts();
        displayLogs();
    </script>

</body>
</html>
