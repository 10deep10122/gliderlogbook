<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance & Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; }
        .card { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 20px; }
        .input-dark { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 10px; color: white; outline: none; }
        .input-dark:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="font-sans min-h-screen pb-20">

    <nav class="p-6 max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter italic text-blue-500">MY TRACKER</h1>
        <button onclick="document.getElementById('settings-modal').classList.remove('hidden')" class="text-gray-400 hover:text-white">
            <i class="fas fa-sliders-h text-xl"></i>
        </button>
    </nav>

    <main class="max-w-5xl mx-auto px-6 space-y-8">
        
        <div class="card p-10 text-center relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-gray-500 text-xs uppercase tracking-[0.2em] mb-2">Restbeløb at spare</p>
                <h2 id="display-remaining" class="text-7xl font-black tracking-tighter text-white">0 kr</h2>
                <p id="display-details" class="text-gray-500 text-sm mt-4 italic font-mono"></p>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold uppercase text-gray-500 tracking-widest">Opgaver & Jobs</h3>
                    <button onclick="document.getElementById('task-modal').classList.remove('hidden')" class="bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold hover:bg-gray-200 transition">+ NY OPGAVE</button>
                </div>
                <div id="task-list" class="space-y-3 font-medium text-white">
                    </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center font-medium text-white">
                    <h3 class="text-sm font-bold uppercase text-gray-500 tracking-widest">Indtjening Log</h3>
                    <span id="total-saved-label" class="text-xs font-mono text-blue-500"></span>
                </div>
                <div id="money-log" class="card divide-y divide-gray-900 overflow-hidden font-medium text-white">
                    </div>
            </div>

        </div>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-sm z-50 flex items-center justify-center p-6 font-medium text-white">
        <div class="card p-8 w-full max-w-md space-y-6">
            <h2 class="text-2xl font-bold">Konfigurer Mål</h2>
            <div class="space-y-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-gray-500 uppercase">Hovedmål (f.eks. 8500)</label>
                    <input type="number" id="cfg-target" class="input-dark" value="8500">
                </div>
                <div class="flex flex-col gap-1 font-medium text-white">
                    <label class="text-xs text-gray-500 uppercase">Fast Rabat (f.eks. 1100)</label>
                    <input type="number" id="cfg-discount" class="input-dark" value="1100">
                </div>
                <div class="flex flex-col gap-1 font-medium text-white">
                    <label class="text-xs text-gray-500 uppercase">Andet fradrag (f.eks. Puregym 4920)</label>
                    <input type="number" id="cfg-other" class="input-dark" value="4920">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">GEM INDSTILLINGER</button>
                <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold text-white font-medium">LUK</button>
            </div>
        </div>
    </div>

    <div id="task-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-sm z-50 flex items-center justify-center p-6 font-medium text-white">
        <div class="card p-8 w-full max-w-md space-y-6 font-medium text-white">
            <h2 class="text-2xl font-bold">Opret Ny Opgave</h2>
            <div class="space-y-4 font-medium text-white">
                <input type="text" id="t-name" placeholder="Hvad skal du lave?" class="w-full input-dark font-medium text-white">
                <input type="number" id="t-reward" placeholder="Hvad tjener du på det? (kr)" class="w-full input-dark font-medium text-white">
                <div class="flex flex-col gap-2 font-medium text-white">
                    <label class="text-xs text-gray-500 uppercase">Upload bevis (valgfrit)</label>
                    <input type="file" id="t-img" class="text-xs text-gray-400">
                </div>
            </div>
            <div class="flex gap-3 font-medium text-white">
                <button onclick="saveTask()" class="flex-1 bg-white text-black py-3 rounded-xl font-bold font-medium">OPRET</button>
                <button onclick="document.getElementById('task-modal').classList.add('hidden')" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold font-medium text-white">FORTRYD</button>
            </div>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('cfg')) || { target: 8500, discount: 1100, other: 4920 };
        let money = JSON.parse(localStorage.getItem('money')) || [{amt: 420, note: 'Startbeløb', date: '09-04-2026'}];
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveSettings() {
            config.target = parseInt(document.getElementById('cfg-target').value) || 0;
            config.discount = parseInt(document.getElementById('cfg-discount').value) || 0;
            config.other = parseInt(document.getElementById('cfg-other').value) || 0;
            localStorage.setItem('cfg', JSON.stringify(config));
            document.getElementById('settings-modal').classList.add('hidden');
            render();
        }

        function saveTask() {
            const name = document.getElementById('t-name').value;
            const reward = document.getElementById('t-reward').value;
            if(!name || !reward) return;
            tasks.push({ id: Date.now(), name, reward: parseInt(reward), done: false });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            document.getElementById('task-modal').classList.add('hidden');
            render();
        }

        function completeTask(id) {
            const idx = tasks.findIndex(t => t.id === id);
            if(confirm(`Markere som færdig? Vil du overføre ${tasks[idx].reward} kr. til opsparingen?`)) {
                money.unshift({ amt: tasks[idx].reward, note: tasks[idx].name, date: new Date().toLocaleDateString('da-DK') });
                tasks.splice(idx, 1);
                localStorage.setItem('money', JSON.stringify(money));
                localStorage.setItem('tasks', JSON.stringify(tasks));
                render();
            }
        }

        function deleteMoney(idx) {
            money.splice(idx, 1);
            localStorage.setItem('money', JSON.stringify(money));
            render();
        }

        function render() {
            // Dashboard Calc
            const saved = money.reduce((s, i) => s + i.amt, 0);
            const subtotal = config.target - config.discount - config.other;
            const remaining = subtotal - saved;

            document.getElementById('display-remaining').innerText = remaining.toLocaleString() + " kr";
            document.getElementById('display-details').innerText = `${config.target} - ${config.discount} (Rabat) - ${config.other} (Pure) - ${saved} (Sparet)`;
            document.getElementById('total-saved-label').innerText = "TOTAL SPARET: " + saved.toLocaleString() + " kr";

            // Tasks
            const tList = document.getElementById('task-list');
            tList.innerHTML = tasks.map(t => `
                <div class="card p-4 flex justify-between items-center border-l-4 border-blue-500">
                    <div>
                        <p class="font-bold">${t.name}</p>
                        <p class="text-xs text-blue-500 font-mono">+ ${t.reward} kr</p>
                    </div>
                    <button onclick="completeTask(${t.id})" class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white transition">
                        <i class="fas fa-check"></i>
                    </button>
                </div>
            `).join('');

            // Money Log
            const mLog = document.getElementById('money-log');
            mLog.innerHTML = money.map((m, i) => `
                <div class="p-4 flex justify-between items-center hover:bg-white/[0.02]">
                    <div>
                        <p class="text-sm font-bold">${m.note}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${m.date}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-bold text-green-500">${m.amt} kr</p>
                        <button onclick="deleteMoney(${i})" class="text-gray-800 hover:text-red-500 text-xs"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
