<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opsparing | Flyveklub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 159, 28, 0.1); }
        .orange-glow { box-shadow: 0 0 20px rgba(255, 159, 28, 0.15); }
        .progress-fill { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen pb-20">

    <header class="p-8 max-w-5xl mx-auto flex justify-between items-end">
        <div>
            <p class="text-[#ff9f1c] font-mono text-xs tracking-[0.3em] uppercase mb-2">Opsparingsplan</p>
            <h1 class="text-4xl font-black tracking-tight text-white italic">FLYVEKLUB <span class="text-[#ff9f1c]">MEDLEMSKAB</span></h1>
        </div>
        <div class="text-right hidden md:block">
            <p class="text-slate-500 text-xs uppercase">Sidst opdateret</p>
            <p class="text-white font-mono">20. April 2026</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 space-y-6">

        <div class="glass p-8 rounded-[2rem] orange-glow">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-slate-400 text-sm">Fremgang</p>
                    <h2 id="perc-text" class="text-5xl font-black text-white">16,9%</h2>
                </div>
                <div class="text-right">
                    <p class="text-slate-400 text-sm font-mono"><span id="total-saved">420</span> / 4.920 kr</p>
                    <p id="mangler-text" class="text-[#ff9f1c] font-bold">Mangler 4.500 kr</p>
                </div>
            </div>
            <div class="w-full bg-white/5 h-4 rounded-full overflow-hidden p-1 border border-white/5">
                <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-[#ff9f1c] to-[#ffbf69] rounded-full" style="width: 16.9%"></div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-6 text-white">
            
            <div class="lg:col-span-2 space-y-6 text-white">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-bold uppercase tracking-widest text-xs text-slate-400">Transaktioner</h3>
                    <button onclick="openModal()" class="bg-[#ff9f1c] hover:bg-[#ffbf69] text-black px-4 py-2 rounded-full font-bold text-xs transition transform hover:scale-105">
                        + REGISTRER INDTJENING
                    </button>
                </div>

                <div class="glass rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white/5 text-[10px] uppercase tracking-tighter text-slate-500">
                            <tr>
                                <th class="p-5 font-medium">Dato</th>
                                <th class="p-5 font-medium">Kilde / Note</th>
                                <th class="p-5 font-medium text-right">Beløb</th>
                            </tr>
                        </thead>
                        <tbody id="data-table" class="divide-y divide-white/5 font-mono text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-6 text-white">
                <h3 class="font-bold uppercase tracking-widest text-xs text-slate-400 px-2">Næste skridt</h3>
                <div class="glass p-6 rounded-[2rem] space-y-4 text-white">
                    <div id="todo-list" class="space-y-3"></div>
                    <div class="pt-4 border-t border-white/5">
                        <input type="text" id="new-todo" placeholder="Tilføj opgave..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#ff9f1c] transition">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-6 text-white">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border border-[#ff9f1c]/30 text-white">
            <h2 class="text-2xl font-black mb-6 italic">TILFØJ DATA</h2>
            <div class="space-y-4 text-white">
                <input type="number" id="in-amount" placeholder="Beløb (kr)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#ff9f1c]">
                <input type="text" id="in-note" placeholder="Hvad har du lavet?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#ff9f1c]">
                <input type="text" id="in-who" placeholder="Hvem udbetalte?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#ff9f1c]">
                <div class="flex gap-3 pt-4">
                    <button onclick="saveData()" class="flex-1 bg-[#ff9f1c] text-black font-black py-4 rounded-2xl hover:bg-[#ffbf69] transition">GEM</button>
                    <button onclick="closeModal()" class="flex-1 bg-white/5 py-4 rounded-2xl hover:bg-white/10 transition font-bold text-white">FORTRYD</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const target = 4920;
        // Start-data fra dit billede
        let db = JSON.parse(localStorage.getItem('flyve_db')) || [
            { date: '19-04-2026', amount: 420, note: 'Arbejde studiejob', who: 'Far' }
        ];
        let todos = JSON.parse(localStorage.getItem('flyve_todos')) || [
            { text: 'Rengør bilen (indvendig)', done: false },
            { text: 'Hjælp naboen med haveaffald', done: false }
        ];

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveData() {
            const a = document.getElementById('in-amount').value;
            const n = document.getElementById('in-note').value;
            const w = document.getElementById('in-who').value;
            if(!a) return;
            db.unshift({ date: new Date().toLocaleDateString('da-DK'), amount: parseInt(a), note: n, who: w });
            localStorage.setItem('flyve_db', JSON.stringify(db));
            render();
            closeModal();
        }

        document.getElementById('new-todo').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value) {
                todos.push({ text: e.target.value, done: false });
                localStorage.setItem('flyve_todos', JSON.stringify(todos));
                e.target.value = '';
                render();
            }
        });

        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            localStorage.setItem('flyve_todos', JSON.stringify(todos));
            render();
        }

        function render() {
            const table = document.getElementById('data-table');
            let total = 0;
            table.innerHTML = db.map((item, i) => {
                total += item.amount;
                return `
                    <tr class="hover:bg-white/[0.02] transition group">
                        <td class="p-5 text-slate-500 text-[10px]">${item.date}</td>
                        <td class="p-5">
                            <div class="font-bold text-white">${item.note}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${item.who}</div>
                        </td>
                        <td class="p-5 text-right font-black text-[#ff9f1c] text-lg italic">${item.amount}.-</td>
                    </tr>
                `;
            }).join('');

            const perc = ((total / target) * 100).toFixed(1);
            document.getElementById('total-saved').innerText = total + " kr";
            document.getElementById('perc-text').innerText = perc + "%";
            document.getElementById('mangler-text').innerText = "Mangler " + (target - total) + " kr";
            document.getElementById('progress-bar').style.width = perc + "%";

            document.getElementById('todo-list').innerHTML = todos.map((t, i) => `
                <div onclick="toggleTodo(${i})" class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/5 cursor-pointer hover:border-[#ff9f1c]/30 transition group text-white">
                    <div class="w-6 h-6 rounded-full border-2 border-white/20 flex items-center justify-center group-hover:border-[#ff9f1c] ${t.done ? 'bg-[#ff9f1c] border-[#ff9f1c]' : ''}">
                        ${t.done ? '<i class="fas fa-check text-[10px] text-black"></i>' : ''}
                    </div>
                    <span class="text-sm font-medium ${t.done ? 'line-through text-slate-600' : 'text-slate-300'}">${t.text}</span>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
